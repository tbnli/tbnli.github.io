<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBNLI Yardage Book</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script src='https://api.tiles.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js'></script>
    
    <style>
        /* Map container must have a explicit height */
        #map {
            width: 100%;
            height: 600px;
        }

        .dropdown-container {
            display: flex;         /* Places items side-by-side */
            align-items: center;   /* Perfectly centers the text vertically with the dropdown */
            gap: 10px;             /* Adds clean spacing between the dropdown and the text */
        }
    </style>
</head>
<body>

    <div class="dropdown-container">
        <label for="holeDropdown">Choose a hole:</label>
        <select id="holeDropdown">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
        </select>
        <span class="right-text">Yardage to Center: </span>
        <span id="yardage" class="right-text"></span>
        <span class="right-text">Yards Elevation: </span>
        <span id="elevation" class="right-text"></span>
    </div>

    <!-- Map container -->
    <div id="map"></div>
    
    <script>
        // Initialize the map and set default view coordinates and zoom level
        const map = L.map('map').setView([0, 0], 2);
        
        const dropdown = document.getElementById('holeDropdown');

        // On page load: check for a saved value and apply it
        window.addEventListener('DOMContentLoaded', () => {
            const savedValue = localStorage.getItem('selectedDropdownValue');
            if (savedValue) {
                dropdown.value = savedValue;
            }
        });

        // On change: save the new selected value
        dropdown.addEventListener('change', (event) => {
            localStorage.setItem('selectedDropdownValue', event.target.value);
            location.reload(); 
        });
        
        const holeDropdownValue = localStorage.getItem('selectedDropdownValue');;

        // Load open-source street map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // show the scale bar on the lower left corner
        L.control.scale().addTo(map);

        // Fetch the map kml file and load it to the map and calculate the distances
        fetch('./Greens/Hole_' + holeDropdownValue + '_Green.kml')
            .then(res => res.text())
            .then(kmltext => {
                // Create new kml overlay
                const track = new omnivore.kml.parse(kmltext);
                map.addLayer(track);

                // Adjust map to show the kml
                const bounds = track.getBounds();
                // map.fitBounds(bounds);
                
                // Get the geographic center of that box
                var center = bounds.getCenter();
    
                // Extract latitude and longitude
                var lat = center.lat;
                var lng = center.lng;
                
                // Define your target destination point
                let targetPoint = L.latLng(lat, lng); // Example: New York City
                L.marker(targetPoint).addTo(map).bindPopup("Target Destination").openPopup();
                
                // Request the user's current location
                map.locate({ 
                    setView: true, 
                    maxZoom: 16, 
                    enableHighAccuracy: true, // Forces GPS usage
                    timeout: 10000,           // Maximum wait time (ms)
                    maximumAge: 0             // Prevents cached locations
                });
        
                map.on('locationfound', function(e) {
                    // const myLocation = e.latlng; // User's location as an L.LatLng object
                    // const myLat = myLocation.lat;
                    // const myLng = myLocation.lng;
                    // FOR TEST (uncomment above for prod) - Olde Beau Clubhouse: 36.413360, -80.981225
                    const myLat = "36.413360";
                    const myLng = "-80.981225";
                    const myLocation = L.latLng(myLat, myLng);

                    // Generate elevation for start and end points
                    // Note: The fetch commands return promises which are asynchronous
                    // Thus they neet to run together to actually use the return values.
                    var startElevation;
                    var endElevation;
                    const startUrl = "https://epqs.nationalmap.gov/v1/json?x=" + myLng + "&y=" + myLat + "&units=Feet&wkid=4326&includeDate=False"; 
                    const endUrl = "https://epqs.nationalmap.gov/v1/json?x=" + lng + "&y=" + lat + "&units=Feet&wkid=4326&includeDate=False"; 
                    
                    fetch(startUrl)
                        .then(startResponse => {
                            if (!startResponse.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return startResponse.json();
                        })
                        .then(startData => {
                            startElevation = startData.value;
                            console.log(startElevation);
                            
                            fetch(endUrl)
                                .then(endResponse => {
                                    if (!endResponse.ok) {
                                        throw new Error('Network response was not ok');
                                    }
                                    return endResponse.json();
                                })
                                .then(endData => {
                                    endElevation = endData.value;
                                    console.log(endElevation)
                                    const elevationInYards = (endElevation - startElevation) / 3;
                                    console.log(elevationInYards);
                                    document.getElementById("elevation").textContent = elevationInYards;
                                })
                                .catch(error => {
                                    console.error('There was a problem with the fetch operation:', error);
                                });
                        })
                        .catch(error => {
                            console.error('There was a problem with the fetch operation:', error);
                        });
                    
                    // Add a marker for the user
                    L.marker(myLocation).addTo(map).bindPopup("You are here").openPopup();
            
                    // Calculate straight-line distance in meters
                    const distanceInYards = myLocation.distanceTo(targetPoint) * 1.094;
            
                    //alert(`You are ${distanceInYards} yards away from the target destination!`);
                    document.getElementById("yardage").textContent = distanceInYards;

                    // Zoom to fit our location and target
                    const bounds = L.latLngBounds([targetPoint, myLocation]);
                    map.fitBounds(bounds);
                });

                // Handle geolocation errors (e.g., permission denied)
                map.on('locationerror', function(e) {
                    alert("Could not access your location: " + e.message);
                });

            }).catch((e) => {
              console.log(e);
            })
                
    </script>
</body>
</html>
